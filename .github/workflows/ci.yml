name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dqo
          POSTGRES_PASSWORD: dqo
          POSTGRES_DB: observability
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dqo -d observability"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DQO_DATABASE_URL: postgresql://dqo:dqo@localhost:5432/observability

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke test CLI
        run: |
          python -m src.dqo.cli run \
            --contract contracts/orders.yml \
            --data data/samples/orders.csv \
            --references data/samples \
            --history-db "$DQO_DATABASE_URL"
